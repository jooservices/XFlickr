# Isolated test stack — ONLY stack for php artisan test / PHPUnit.
# Dev MySQL (xflickr-dev-mysql-data) must not be touched by RefreshDatabase / migrate:fresh.
# FORBIDDEN: docker exec xflickr-dev-* or docker compose exec app php artisan test
#
# Run all tests:
#   bash scripts/test.sh gate:test
#   composer test:docker
#   ./scripts/test-docker.sh
#
# Run a filter:
#   ./scripts/test-docker.sh --filter=TokenBridgeTest
#   docker compose -f docker-compose.test.yml run --rm test php artisan test --filter=TokenBridgeTest

name: xflickr-test

include:
  - docker/compose/volumes-test.yml

x-php-build: &php-build
  build:
    context: .
    dockerfile: Dockerfile

services:
  test:
    <<: *php-build
    environment:
      APP_NAME: xflickr
      APP_ENV: testing
      APP_KEY: ${APP_KEY:-base64:+uMxrQHiSSnSC9QQV4KkDMmLjTIBbCEe5KZsCUlWuuk=}
      APP_DEBUG: "true"
      APP_URL: http://localhost
      BCRYPT_ROUNDS: "4"
      BROADCAST_CONNECTION: "null"
      CACHE_STORE: array
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      DB_URL: ""
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      PULSE_ENABLED: "false"
      TELESCOPE_ENABLED: "false"
      NIGHTWATCH_ENABLED: "false"
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: xflickr_test
      CONFIG_STORE_CACHE_ENABLED: "false"
      EVENTS_EVENTSOURCING_ENABLED: "true"
      EVENTS_EVENT_LOG_ENABLED: "true"
    volumes:
      - .:/var/www/html
      - ./docker/php/pcov.ini:/usr/local/etc/php/conf.d/zz-pcov-directory.ini:ro
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    entrypoint: ["/var/www/html/docker/test-entrypoint.sh"]
    command: ["php", "artisan", "test"]

  redis:
    image: redis:8.8.0-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:8.3.4
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
