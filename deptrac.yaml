deptrac:
  paths:
    - ./app
    - ./Modules

  layers:
    - name: Model
      collectors:
        - type: classLike
          value: App\\Models\\.*
    - name: Service
      collectors:
        - type: classLike
          value: App\\Services\\.*
        - type: classLike
          value: Modules\\.*\\Services\\.*
    - name: Controller
      collectors:
        - type: classLike
          value: App\\Http\\Controllers\\.*
        - type: classLike
          value: Modules\\.*\\Http\\Controllers\\.*
    - name: Repository
      collectors:
        - type: classLike
          value: App\\Repositories\\.*
        - type: classLike
          value: Modules\\.*\\Repositories\\.*
    - name: Job
      collectors:
        - type: classLike
          value: App\\Jobs\\.*
        - type: classLike
          value: Modules\\.*\\Jobs\\.*

  ruleset:
    # Primary audit guard: Models must not import Services, Repositories, Controllers, or Jobs.
    Model: []
    Repository:
      - Model
    Service:
      - Model
      - Repository
      - Job
    Job:
      - Service
      - Model
      - Repository
    Controller:
      - Service
      - Model
