title = "XFlickr gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "PHPUnit and CI test APP_KEY placeholders"
paths = [
  '''phpunit\.xml''',
  '''\.github/workflows/ci\.yml''',
  '''\.github/workflows/release\.yml''',
]

[[allowlists]]
description = "Example env placeholders"
paths = [
  '''\.env\.example''',
]

[[allowlists]]
description = "PHPUnit feature tests with fake API credentials"
condition = "AND"
paths = [
  '''^tests/''',
  '''^Modules/.*/tests/''',
]
regexes = [
  '''test-api-key-12345''',
  '''test-api-secret''',
]
stopwords = [
  "test-api-key-12345",
  "test-api-secret",
]

[[allowlists]]
description = "Documentation examples"
paths = [
  '''docs/''',
  '''README\.md''',
  '''CHANGELOG\.md''',
  '''audit.*\.md''',
]
