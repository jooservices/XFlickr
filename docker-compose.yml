# Local development stack — NEVER run tests or migrate:fresh here.
# Tests: composer test:docker  OR  docker compose -f docker-compose.test.yml run --rm test
# Agents: read AGENTS.md and docs/05-maintenance/docker-safety.md before any docker compose exec.
name: xflickr

x-php-build: &php-build
  build:
    context: .
    dockerfile: Dockerfile

x-php-environment: &php-environment
  APP_NAME: xflickr
  APP_ENV: local
  APP_KEY: ${APP_KEY}
  APP_DEBUG: "true"
  APP_URL: http://localhost:8082
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: xflickr
  DB_USERNAME: xflickr
  DB_PASSWORD: secret
  SESSION_DRIVER: database
  CACHE_STORE: database
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  HORIZON_NAME: xflickr-horizon
  FLICKR_CALLBACK_URL: http://localhost:8082/flickr/callback
  MONGODB_URI: mongodb://mongodb:27017
  MONGODB_DATABASE: xflickr
  CONFIG_STORE_CACHE_ENABLED: "true"
  EVENTS_EVENTSOURCING_ENABLED: "true"
  EVENTS_EVENT_LOG_ENABLED: "true"

x-php-base: &php-base
  <<: *php-build
  restart: unless-stopped
  environment:
    <<: *php-environment
  volumes:
    - .:/var/www/html
    - node-modules:/var/www/html/node_modules
  entrypoint: ["/var/www/html/docker/entrypoint.sh"]
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    mongodb:
      condition: service_healthy

services:
  mysql:
    image: mysql:9
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: xflickr
      MYSQL_USER: xflickr
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    <<: *php-base
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "8082:8000"
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@fsockopen('127.0.0.1', 8000));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  horizon:
    <<: *php-base
    command: ["php", "artisan", "horizon"]

  scheduler:
    <<: *php-base
    command: ["php", "artisan", "schedule:work"]

  vite:
    <<: *php-build
    restart: unless-stopped
    command: >
      sh -lc 'stamp=node_modules/.deps-stamp;
      if [ ! -f "$$stamp" ] || [ package-lock.json -nt "$$stamp" ]; then npm ci && touch "$$stamp"; fi;
      npm run dev -- --host 0.0.0.0 --port 5173'
    environment:
      <<: *php-environment
      VITE_DEV_HOST: localhost
      VITE_DEV_PORT: "5174"
    ports:
      - "5174:5173"
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules
    depends_on:
      app:
        condition: service_started

volumes:
  mysql-data:
  mongodb-data:
  node-modules:
