# Local development stack — operator only. NEVER run tests or migrate:fresh here.
# Tests: bash scripts/test.sh gate:test
# Agents: read AGENTS.md — use scripts/test.sh only, never dev stack.
name: xflickr-dev

x-php-build: &php-build
  build:
    context: .
    dockerfile: Dockerfile

x-php-environment: &php-environment
  APP_NAME: xflickr
  APP_ENV: local
  APP_KEY: ${APP_KEY}
  APP_DEBUG: "true"
  APP_URL: http://localhost:${APP_HOST_PORT:-8082}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: ${MYSQL_DATABASE:-xflickr}
  DB_USERNAME: ${MYSQL_USER:-xflickr}
  DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
  SESSION_DRIVER: database
  CACHE_STORE: database
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  HORIZON_NAME: xflickr-horizon
  FLICKR_CALLBACK_URL: http://localhost:${APP_HOST_PORT:-8082}/flickr/callback
  MONGODB_URI: mongodb://mongodb:27017
  MONGODB_DATABASE: xflickr
  CONFIG_STORE_CACHE_ENABLED: "true"
  EVENTS_EVENTSOURCING_ENABLED: "true"
  EVENTS_EVENT_LOG_ENABLED: "true"
  VITE_CACHE_DIR: /tmp/xflickr-vite-cache
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: ${REVERB_APP_ID:-xflickr-local}
  REVERB_APP_KEY: ${REVERB_APP_KEY:-xflickr-local-key}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:-xflickr-local-secret}
  # PHP publishes to the reverb service on the Docker network.
  REVERB_HOST: reverb
  REVERB_PORT: "8080"
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080

x-php-base: &php-base
  <<: *php-build
  restart: unless-stopped
  environment:
    <<: *php-environment
  volumes:
    - .:/var/www/html
    - node-modules:/var/www/html/node_modules
  entrypoint: ["/var/www/html/docker/entrypoint.sh"]
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    mongodb:
      condition: service_healthy

include:
  - docker/compose/volumes-dev.yml

services:
  mysql:
    image: mysql:9
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xflickr}
      MYSQL_USER: ${MYSQL_USER:-xflickr}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
    ports:
      - "${MYSQL_HOST_PORT:-3308}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "${MONGODB_HOST_PORT:-27019}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    <<: *php-base
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    environment:
      <<: *php-environment
      PHP_CLI_SERVER_WORKERS: "4"
    ports:
      - "${APP_HOST_PORT:-8082}:8000"
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@fsockopen('127.0.0.1', 8000));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  horizon:
    <<: *php-base
    command: ["php", "artisan", "horizon"]

  scheduler:
    <<: *php-base
    command: ["php", "artisan", "schedule:work"]

  reverb:
    <<: *php-base
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_HOST_PORT:-8083}:8080"
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@fsockopen('127.0.0.1', 8080));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: node:22-bookworm
    working_dir: /var/www/html
    command: sh scripts/docker-dev.sh
    ports:
      - "${FRONTEND_HOST_PORT:-5174}:5173"
    environment:
      VITE_DEV_HOST: ${VITE_DEV_HOST:-localhost}
      VITE_DEV_PORT: ${FRONTEND_HOST_PORT:-5174}
      VITE_CACHE_DIR: /tmp/xflickr-vite-cache
      VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-xflickr-local-key}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
      VITE_REVERB_PORT: ${REVERB_HOST_PORT:-8083}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    volumes:
      - .:/var/www/html
      - frontend-node-modules:/var/www/html/node_modules
    depends_on:
      app:
        condition: service_started
      reverb:
        condition: service_started
