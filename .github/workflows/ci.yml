name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Required by docker-compose.test.yml (APP_KEY: ${APP_KEY})
      APP_KEY: base64:+uMxrQHiSSnSC9QQV4KkDMmLjTIBbCEe5KZsCUlWuuk=
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify AI instruction sync
        run: php tools/verify-ai-instructions-sync.php

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests (isolated Docker test stack)
        run: composer test:docker
